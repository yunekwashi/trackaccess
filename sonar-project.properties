# SonarQube Project Configuration
sonar.projectKey=TrackAccess
sonar.projectName=TrackAccess
sonar.projectVersion=1.0

# Path to the source directories
# For monorepo, we include all relevant subdirectories
sonar.sources=trackaccess-main/lib,backend,arduino_rfid_scanner

# Encoding of the source files
sonar.sourceEncoding=UTF-8

# Language-specific configurations
# Flutter/Dart
sonar.dart.analysis.options=trackaccess-main/analysis_options.yaml

# PHP
sonar.php.exclusions=**/vendor/**

# Arduino (C++)
sonar.c.file.suffixes=.ino,.cpp,.h

# Exclude build artifacts and dependencies
sonar.exclusions=**/build/**,**/.dart_tool/**,**/ios/**,**/android/**,**/linux/**,**/macos/**,**/windows/**,**/test/**

# SonarQube Server details (usually provided during scan)
# sonar.host.url=http://localhost:9000
# sonar.login=your_token_here
